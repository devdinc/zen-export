plugins {
    id 'java'
    id 'application'
}

group   = 'dev.zenexport'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'io.gitlab.autumnmeowmeow:jexer:2.0.0'

    // JSON parsing (catalogue.json)
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.1'
}

application {
    mainClass = 'dev.zenexport.app.Main'
    // Force headless Xterm backend so Jexer stays in the terminal
    applicationDefaultJvmArgs = [
        '-Djexer.Swing=false',
        '-Djexer.ECMA48.colorMode=xterm256',
    ]
}

jar {
    manifest {
        attributes 'Main-Class': 'dev.zenexport.app.Main'
    }
    from {
        configurations.runtimeClasspath.collect {
            it.isDirectory() ? it : zipTree(it)
        }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    archiveBaseName = 'zen_export'
}

tasks.named('run') {
    // Attach stdin so the TUI can receive keyboard events
    standardInput = System.in
}
